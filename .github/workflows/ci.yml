name: taller_formativo_04 - CICD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build_and_test:
    name: Verificación y Pruebas
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04]
        python-version: ["3.8", "3.12"]
    
    steps:
      - name: Clonar el código fuente
        uses: actions/checkout@v4
        
      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Instalar dependencias
        working-directory: taller_formativo_4/taller_evaluado_04
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Verificación de Formato (Ruff)
        working-directory: taller_formativo_4/taller_evaluado_04
        run: |
          ruff check .
          ruff format --check .
          
      - name: Ejecutar Pruebas (Pytest)
        working-directory: taller_formativo_4/taller_evaluado_04
        run: pytest -v