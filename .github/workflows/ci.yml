name: taller_formativo_04 - CICD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Verificación de Formato (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el código fuente
        uses: actions/checkout@v4
      
      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Instalar linter (Ruff)
        run: pip install ruff
        
      - name: Ejecutar revisión de formato
        # Navegamos hacia la carpeta donde realmente está tu código
        working-directory: taller_formativo_4/taller_evaluado_04
        run: |
          ruff check .
          ruff format --check .

  test:
    name: Pruebas Unitarias (Pytest)
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04]
        python-version: ["3.8", "3.12"]
    
    steps:
      - name: Clonar el código fuente
        uses: actions/checkout@v4
        
      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Instalar dependencias y framework de pruebas
        working-directory: taller_formativo_4/taller_evaluado_04
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          
      - name: Ejecutar Pruebas
        working-directory: taller_formativo_4/taller_evaluado_04
        run: pytest -v